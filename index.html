<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="css/tic_tac_toe.css" />
  <script src="js/tic_tac_toe.js" defer></script>
</head>
<body>
  <div class="main-bg">
    <div id="tic-tac-toe-board" aria-label="Tic Tac Toe board">
      <button class="box box0" aria-label="Square 1"></button>
      <button class="box box1" aria-label="Square 2"></button>
      <button class="box box2" aria-label="Square 3"></button>
      <button class="box box3" aria-label="Square 4"></button>
      <button class="box box4" aria-label="Square 5"></button>
      <button class="box box5" aria-label="Square 6"></button>
      <button class="box box6" aria-label="Square 7"></button>
      <button class="box box7" aria-label="Square 8"></button>
      <button class="box box8" aria-label="Square 9"></button>
    </div>

    <div class="start-menu container">
      <button id="start-menu-random-match" class="start-menu button random-match">Random Match</button>
      <button id="start-menu-join-player" class="start-menu button join">Join Player</button>
      <button id="start-menu-host" class="start-menu button host">Host</button>
    </div>

    <div class="side-menu container">
      <button id="side-random-match" class="side-menu button random-match">Random Match</button>
      <button id="side-join-player" class="side-menu button join">Join Player</button>
      <button id="side-host" class="side-menu button host">Host</button>
      <button id="side-leave" class="side-menu button leave">Leave</button>
    </div>

    <button class="menu-button" aria-label="Toggle menu"></button>

    <div class="join-room active container">
      <span id="title-join-room" class="join-room active">Join Room</span>
      <input type="text" id="input-room-id" class="join-room active" autocomplete="off" placeholder="enter room id" />
    </div>

    <div class="restriction active container">
      <span class="restriction active title">Room Restriction</span>
      <button class="restriction active choice private">Private</button>
      <button class="restriction active choice public">Public</button>
    </div>

    <div class="new-game container">
      <span class="new-game title">NEW GAME</span>
      <div class="binary-choice active container">
        <button id="yes" class="binary-choice active choice">Yes</button>
        <button id="no" class="binary-choice active choice">No</button>
      </div>
    </div>

    <span class="room-id"></span>
    <span class="result active"></span>
    <span class="player-status active"></span>
  </div>
</body>
</html>
